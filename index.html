    <title>BHB Components — BuchhaltungsButler</title>

    <!-- Lato webfont (matches the design system's --font-family-base token).
         Preconnect speeds up the handshake; display=swap shows a system fallback
         immediately and swaps in Lato when it arrives — no flash of invisible text. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
